<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanjut ke Halaman</title>

  <!-- ========== KUNCINYA BIAR FOTO NONGOL DI FB/IG/WA ========== -->
  <meta property="og:title" content="Cek Ini Dulu Ya" />
  <meta property="og:description" content="CONTINUE🔞 " />
  <meta property="og:image" content="https://res.cloudinary.com/daxme62nv/image/upload/v1783350980/arc3qz4bgcckokg7z8nk.png" /> <!-- GANTI FOTO -->
  <meta property="og:url" content="https://ISI-LINK-VERCEL-KAMU.vercel.app" /> <!-- GANTI LINK -->
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://res.cloudinary.com/daxme62nv/image/upload/v1783101119/iahnfcpo8jxa64rih6cu.jpg"> <!-- GANTI FOTO -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; }

    /* 1. LOADING PROGRESS BAR */
    #loading {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a0a; z-index: 9999;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      transition: opacity 0.5s ease;
    }
    #loading h2 { color: #fff; font-size: 22px; margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }
    .progress-bar {
      width: 80%; max-width: 350px;
      height: 8px; background: rgba(255,255,255,0.15);
      border-radius: 10px; overflow: hidden;
    }
    .progress {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 10px; transition: width 0.1s linear;
    }
    #percent { color: #fff; margin-top: 12px; font-size: 14px; opacity: 0.8; }

    /* 2. BACKGROUND FOTO FULL */
    .bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('https://res.cloudinary.com/dl4ijdbe/image/upload/v1783829799/yd149ij5i6ejvwadwulr.jpg'); /* GANTI FOTO SAMA */
      background-size: cover; background-position: center;
      filter: brightness(0.6);
    }
    .overlay { position: relative; z-index: 2; height: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.8s ease; }
    .overlay.show { opacity: 1; }

    /* 3. CARD DI TENGAH */
    .card {
      background: rgba(0, 0, 0, 0.55); 
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2); 
      border-radius: 24px;
      padding: 40px 35px; max-width: 420px; width: 100%;
      text-align: center; color: #fff; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: fadeInUp 0.8s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 15px; opacity: 0.9; margin-bottom: 25px; }
    
    /* 4. TOMBOL NEXT */
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 17px;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <!-- BAGIAN LOADING -->
  <div id="loading">
    <h2>LOADING...</h2>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div id="percent">0%</div>
  </div>

  <!-- BAGIAN KONTEN -->
  <div class="bg"></div>
  <div class="overlay" id="mainContent">
    <div class="card">
      <h1>Hampir Selesai</h1>
      <p>CONTINUE🔞 </p>
      <a id="redirectBtn" href="#" class="btn">NEXT →</a>
    </div>
  </div>

  <script>
    // ========== CONFIG ==========
    const redirectUrl = "https://instagram.com"; // GANTI LINK TUJUAN KAMU
    document.getElementById("redirectBtn").href = redirectUrl;

    // ========== ANIMASI PROGRESS BAR 3 DETIK ==========
    let progress = 0;
    const progressInterval = setInterval(() => {
      progress += 3.33; // 100% / 3 detik
      if(progress > 100) progress = 100;
      
      document.getElementById("progress").style.width = progress + "%";
      document.getElementById("percent").innerText = Math.round(progress) + "%";

      if(progress >= 100) {
        clearInterval(progressInterval);
        
        // Hilangkan loading, munculkan konten
        document.getElementById("loading").style.opacity = "0";
        document.getElementById("mainContent").classList.add("show");
        setTimeout(() => {
          document.getElementById("loading").style.display = "none";
        }, 500);
      }
    }, 100); // update tiap 100ms
  </script>
</body>
</html>
